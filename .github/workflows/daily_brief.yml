name: FT 데일리 브리핑 자동화
on:
  schedule:
    - cron: '0 11 * * *'  # UTC 11:00 = KST 20:00 (FT only)
    - cron: '0 12 * * *'  # UTC 12:00 = KST 21:00 (나머지 전체)
  workflow_dispatch:  # 수동 트리거 (전체 실행)

permissions:
  contents: write

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily brief
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          LOG_LEVEL: INFO
          FEED_GROUP: ${{ github.event.schedule == '0 11 * * *' && 'ft' || 'all' }}
        run: |
          python main.py --mode daily
      
      - name: Deploy briefing page
        run: |
          git config user.name "FT Automation"
          git config user.email "forbetterday@gmail.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update briefing - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: output/
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        run: echo "✗ 데일리 브리핑 실행 실패. 로그를 확인하세요."
