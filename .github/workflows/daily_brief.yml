name: Daily News Brief 자동화
on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = KST 07:00
    - cron: '0 3 * * *'   # UTC 03:00 = KST 12:00
    - cron: '0 11 * * *'  # UTC 11:00 = KST 20:00
    - cron: '0 12 * * *'  # UTC 12:00 = KST 21:00
  workflow_dispatch:  # 수동 트리거

permissions:
  contents: write

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily brief
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          python main.py --mode daily
      
      - name: Deploy briefing page
        run: |
          git config user.name "FT Automation"
          git config user.email "forbetterday@gmail.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update briefing - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: output/
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        run: echo "✗ 데일리 브리핑 실행 실패. 로그를 확인하세요."
